---
layout: default
---

<a class="back-link" href="{{ '/' | relative_url }}">back to posts</a>

<article>
  <div class="post-header">
    <div class="post-meta-line">
      <span class="post-date">{{ page.date | date: "%b %-d, %Y" | downcase }}</span>
      {% if page.tags.size > 0 %}
        {% for tag in page.tags %}
          <a class="post-tag" href="{{ '/tag/' | append: tag | relative_url }}">#{{ tag }}</a>
        {% endfor %}
      {% endif %}
    </div>
    <h1>{{ page.title }}</h1>
    {% if page.excerpt %}
      <p style="font-size:15px; color:var(--text-muted); margin-top:0.75rem; max-width:600px;">{{ page.excerpt | strip_html }}</p>
    {% endif %}
  </div>

  <div class="post-body">
    {{ content }}
  </div>
</article>
