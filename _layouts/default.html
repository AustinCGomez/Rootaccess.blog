<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% feed_meta %}
  {% seo %}
</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0VZH0CTF7P"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-0VZH0CTF7P');
</script>

<body>

<header>
  <a class="logo" href="{{ '/' | relative_url }}">rootaccess.blog</a>
  <span class="header-meta" id="header-date"></span>
</header>

{{ content }}

<footer>
  <div class="footer-left"><span>rootaccess.blog</span> &mdash; all rights reserved</div>
  <div class="footer-right">built with caffeine &amp; curiosity</div>
</footer>

<script>
  const d = new Date();
  const opts = { weekday:'short', year:'numeric', month:'short', day:'numeric' };
  document.getElementById('header-date').textContent = d.toLocaleDateString('en-US', opts).toLowerCase();
</script>

</body>
</html>
