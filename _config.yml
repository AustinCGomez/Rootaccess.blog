# ============================================================
# rootaccess.blog — Jekyll Configuration
# ============================================================

title:       rootaccess
tagline:     "IT notes from the trenches"
description: "Practical IT guides covering Linux, networking, homelab, DevOps, and security."
url:         "https://rootaccess.blog"
baseurl:     ""
lang:        en

# -- Author
author:
  name:   "Your Name"
  handle: "yourhandle"      # used in the nav prompt: yourhandle@rootaccess:~ $
  email:  "you@rootaccess.blog"
  github: "yourhandle"

# -- Build
markdown:    kramdown
highlighter: rouge
permalink:   /:year/:month/:day/:title/

kramdown:
  input:          GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

# -- Sass
sass:
  sass_dir: _sass
  style:    compressed

# -- Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# -- Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .git
  - node_modules
