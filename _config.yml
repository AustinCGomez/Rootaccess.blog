title: rootaccess.blog
description: Notes from the help desk, the home lab, and the command line.
url: "https://rootaccess.blog"
baseurl: ""

author:
  name: Austin
  email: ""

# Build
markdown: kramdown
highlighter: rouge
permalink: /posts/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - deploy.sh
  - node_modules

# Collections / tags
tag_page_layout: tag
tag_page_dir: tag
